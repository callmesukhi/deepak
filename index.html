<style>
/* ==========================================================
   BOARDREADY ENGLISH · CLASS XII
   Vibrant, mobile-first study app in a single HTML file.
   ========================================================== */

:root{
  --bg:#F6F4FE; --surface:#FFFFFF; --surface2:#F2EFFC;
  --ink:#221E3F; --ink2:#4A4570; --muted:#7B76A3; --line:#E7E3F7;

  --brand:#6C5CE7; --brand2:#8B7CF3; --brandSoft:#EDEAFF;
  --flam:#F2477E;  --flamSoft:#FFE7EF;
  --poet:#E08700;  --poetSoft:#FFF1D9;
  --vist:#0FA396;  --vistSoft:#DDF6F2;
  --arch:#7C8798;  --archSoft:#EDF0F4;

  --good:#1DB954; --goodSoft:#E3F8EB;
  --bad:#EF4444;  --badSoft:#FDE8E8;

  --shadow:0 12px 32px rgba(76,60,178,.14);
  --shadow-sm:0 4px 14px rgba(76,60,178,.10);
}
[data-theme="dark"]{
  --bg:#141126; --surface:#1E1A38; --surface2:#282350;
  --ink:#F2F0FF; --ink2:#CFC9F0; --muted:#9C96C6; --line:#332E58;

  --brandSoft:#2D2758;
  --flamSoft:#3D2136; --poetSoft:#3B2D14; --vistSoft:#15332F; --archSoft:#262B36;
  --goodSoft:#16321F; --badSoft:#3A1D1D;

  --shadow:0 12px 32px rgba(0,0,0,.5);
  --shadow-sm:0 4px 14px rgba(0,0,0,.4);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html{ scroll-behavior:smooth; }
body{
  margin:0; min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:'Outfit',system-ui,-apple-system,sans-serif;
  font-size:16px; line-height:1.55;
  transition:background .3s, color .3s;
}
body::before{
  content:""; position:fixed; inset:-10%; z-index:-1; pointer-events:none;
  background:
    radial-gradient(560px 400px at 10% 6%, rgba(242,71,126,.13), transparent 60%),
    radial-gradient(680px 480px at 92% 10%, rgba(108,92,231,.15), transparent 60%),
    radial-gradient(600px 500px at 70% 96%, rgba(15,163,150,.12), transparent 60%);
}
button{ font:inherit; }
.hidden{ display:none !important; }
:focus-visible{ outline:3px solid var(--brand); outline-offset:2px; border-radius:6px; }

/* ---------------- Top bar ---------------- */
.topbar{
  position:sticky; top:0; z-index:70;
  padding-top:env(safe-area-inset-top);
  background:var(--bg);
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.tb-in{
  max-width:1160px; margin:0 auto; padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.logo{ display:flex; align-items:center; gap:10px; min-width:0; }
.logo-badge{
  width:42px; height:42px; flex:none; border-radius:14px;
  background:linear-gradient(135deg,var(--flam),var(--brand));
  display:flex; align-items:center; justify-content:center;
  font-size:21px; box-shadow:0 6px 16px rgba(108,92,231,.35);
}
.logo-badge img{ width:100%; height:100%; object-fit:cover; border-radius:inherit; display:block; }
.logo-txt{ font-family:'Baloo 2',cursive; font-weight:800; font-size:20px; line-height:1.05; }
.logo-txt em{ font-style:normal; color:var(--brand); }
.logo-sub{ font-size:10.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.tb-right{ display:flex; align-items:center; gap:8px; }
.search-desk{
  display:none;
  width:250px; border:1.5px solid var(--line); background:var(--surface);
  color:var(--ink); border-radius:999px; padding:9px 16px; font-size:13.5px;
}
.search-desk::placeholder{ color:var(--muted); }
.icon-btn{
  width:42px; height:42px; border-radius:14px; border:1.5px solid var(--line);
  background:var(--surface); color:var(--ink); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .12s, background .15s;
}
.icon-btn:active{ transform:scale(.92); }

/* ---------------- Shell + views ---------------- */
.shell{ max-width:1160px; margin:0 auto; padding:18px 16px calc(112px + env(safe-area-inset-bottom)); }
.view{ display:none; }
.view.active{ display:block; animation:viewIn .28s ease; }
@keyframes viewIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }

/* ---------------- Bottom nav (mobile) / side rail (desktop) ---------------- */
.navbar{
  position:fixed; left:12px; right:12px; bottom:12px; z-index:80;
  display:flex; gap:4px;
  background:var(--surface); border:1px solid var(--line);
  border-radius:24px; box-shadow:var(--shadow);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  background:none; border:0; border-radius:16px; padding:8px 4px;
  color:var(--muted); cursor:pointer; font-size:11px; font-weight:700;
  transition:background .15s, color .15s;
}
.nav-btn .ic{ font-size:20px; line-height:1; transition:transform .15s; }
.nav-btn.active{ color:var(--brand); background:var(--brandSoft); }
.nav-btn.active .ic{ transform:translateY(-2px) scale(1.12); }

@media (min-width:861px){
  .search-desk{ display:block; }
  .shell{ padding:26px 24px 48px 116px; }
  .navbar{
    left:16px; right:auto; top:92px; bottom:auto;
    flex-direction:column; width:78px; gap:6px;
    padding:10px 8px; border-radius:22px;
  }
  .nav-btn{ flex:none; padding:10px 4px; }
}

/* ---------------- Shared cards, buttons, tags ---------------- */
.card{
  background:var(--surface); border:1px solid var(--line);
  border-radius:22px; padding:18px; box-shadow:var(--shadow-sm);
}
.sec-h{
  font-family:'Baloo 2',cursive; font-weight:800; font-size:21px;
  margin:26px 0 12px; display:flex; align-items:center; gap:8px;
}
.btn{
  border:0; border-radius:999px; padding:13px 22px;
  font-weight:700; font-size:15px; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .12s, box-shadow .15s, background .15s;
}
.btn:active{ transform:scale(.96); }
.btn-primary{
  background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff;
  box-shadow:0 8px 20px rgba(108,92,231,.35);
}
.btn-primary:hover{ box-shadow:0 10px 26px rgba(108,92,231,.45); }
.btn-soft{ background:var(--surface); border:1.5px solid var(--line); color:var(--ink2); }
.btn-soft:hover{ border-color:var(--brand); color:var(--brand); }
.btn-white{ background:#fff; color:var(--brand); box-shadow:0 6px 16px rgba(0,0,0,.18); }
.tag{
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:800; letter-spacing:.02em;
  padding:4px 11px; border-radius:999px; white-space:nowrap;
}
.ring-wrap{ position:relative; display:inline-block; }
.ring-num{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Baloo 2',cursive; font-weight:800;
}

/* ---------------- Home ---------------- */
.hero{
  border-radius:28px; padding:22px;
  background:linear-gradient(135deg,var(--brand) 0%,#7A5AF0 55%,var(--flam) 130%);
  color:#fff; box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:relative; overflow:hidden;
}
.hero::after{
  content:"🦩"; position:absolute; right:-14px; bottom:-22px;
  font-size:110px; opacity:.14; transform:rotate(-12deg); pointer-events:none;
}
.hero-hi{ font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(21px,5.4vw,27px); line-height:1.15; margin:0; }
.hero-sub{ margin:6px 0 0; font-size:13.5px; color:rgba(255,255,255,.88); max-width:420px; }
.hero .ring-num{ color:#fff; font-size:18px; }
.cont-card{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:14px; }
.cc-kicker{ font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0; }
.cc-name{ font-family:'Baloo 2',cursive; font-weight:800; font-size:19px; margin:2px 0 6px; }
.bar-row{ display:flex; align-items:center; gap:12px; padding:8px 0; }
.bar-tagcol{ width:118px; flex:none; }
.bar-track{ flex:1; height:12px; border-radius:99px; background:var(--surface2); overflow:hidden; }
.bar-fill{ height:100%; border-radius:99px; transition:width .5s ease; }
.bar-n{ width:44px; flex:none; text-align:right; font-size:12.5px; font-weight:700; color:var(--muted); }
.quick{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.quick-btn{
  border:0; cursor:pointer; text-align:left;
  border-radius:22px; padding:16px; color:var(--ink);
  background:var(--surface); border:1.5px solid var(--line); box-shadow:var(--shadow-sm);
  transition:transform .15s, border-color .15s;
}
.quick-btn:hover{ transform:translateY(-2px); border-color:var(--brand); }
.qb-ic{ font-size:26px; }
.qb-t{ font-family:'Baloo 2',cursive; font-weight:800; font-size:16.5px; margin:6px 0 2px; }
.qb-s{ font-size:12.5px; color:var(--muted); }
.note-card{ font-size:13.5px; color:var(--ink2); background:var(--surface2); border:0; }

/* ---------------- Library ---------------- */
.search-big{
  width:100%; border:1.5px solid var(--line); background:var(--surface);
  color:var(--ink); border-radius:18px; padding:14px 18px; font-size:15px;
  box-shadow:var(--shadow-sm); margin-bottom:12px;
}
.search-big::placeholder{ color:var(--muted); }
.filters{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 10px; scrollbar-width:none; }
.filters::-webkit-scrollbar{ display:none; }
.pill{
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink2);
  border-radius:999px; padding:8px 15px; font-weight:700; font-size:13px;
  cursor:pointer; white-space:nowrap; transition:all .15s;
}
.pill.active{ background:var(--brand); border-color:var(--brand); color:#fff; box-shadow:0 6px 14px rgba(108,92,231,.3); }
.grid{ display:grid; grid-template-columns:1fr; gap:12px; }
@media (min-width:620px){ .grid{ grid-template-columns:1fr 1fr; } }
@media (min-width:1020px){ .grid{ grid-template-columns:1fr 1fr 1fr; } }
.ch-card{
  text-align:left; cursor:pointer;
  background:var(--surface); border:1.5px solid var(--line);
  border-radius:20px; padding:16px; box-shadow:var(--shadow-sm);
  transition:transform .15s, border-color .15s;
}
.ch-card:hover{ transform:translateY(-3px); border-color:var(--brand); }
.ch-card.archive{ border-style:dashed; opacity:.9; }
.cc-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.cc-title{ font-family:'Baloo 2',cursive; font-weight:800; font-size:18px; line-height:1.2; margin:0; }
.cc-auth{ font-size:12.5px; color:var(--muted); margin:3px 0 0; }
.cc-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
.done-chip{ font-size:12px; font-weight:800; padding:5px 12px; border-radius:999px; background:var(--goodSoft); color:var(--good); }
.todo-chip{ font-size:12px; font-weight:800; padding:5px 12px; border-radius:999px; background:var(--surface2); color:var(--muted); }
.open-hint{ font-size:13px; font-weight:700; color:var(--brand); }
.empty{ text-align:center; color:var(--muted); padding:34px 10px; font-weight:600; }

/* ---------------- Reader ---------------- */
.rd-top{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:14px; }
.chip-btn{
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink2);
  border-radius:999px; padding:9px 15px; font-weight:700; font-size:13px; cursor:pointer;
  transition:all .15s;
}
.chip-btn:hover:not(:disabled){ border-color:var(--brand); color:var(--brand); }
.chip-btn:disabled{ opacity:.4; cursor:default; }
.rd-nav{ display:flex; gap:8px; }
.rd-hero{
  border-radius:26px; padding:20px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.rd-hero-main{ flex:1; min-width:220px; }
.rd-title{ font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(25px,6vw,33px); line-height:1.12; margin:8px 0 2px; }
.rd-auth{ font-size:13.5px; color:var(--ink2); font-weight:600; margin:0; }
.rd-doodle{
  flex:none; width:104px; height:104px; border-radius:26px;
  background:var(--surface); box-shadow:var(--shadow-sm);
  display:flex; align-items:center; justify-content:center;
}
.rd-doodle .doodle-svg{ width:68px; height:68px; }
.rd-doodle .doodle-caption{ display:none; }
.revised-pill{
  display:inline-flex; align-items:center; gap:8px; margin-top:12px;
  padding:9px 17px; border-radius:999px; cursor:pointer;
  border:2px solid var(--good); color:var(--good); background:transparent;
  font-weight:800; font-size:13.5px; transition:all .15s;
}
.revised-pill.on{ background:var(--good); color:#fff; box-shadow:0 6px 14px rgba(29,185,84,.35); }
.banner{ border-radius:16px; padding:12px 15px; margin:14px 0 0; font-size:13.5px; font-weight:600; }
.banner.warn{ background:var(--poetSoft); color:var(--poet); }
.banner.info{ background:var(--brandSoft); color:var(--brand); }
.theme-strip{ margin:16px 0; }
.ts-kicker{ font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0; }
.ts-line{ font-family:'Baloo 2',cursive; font-weight:800; font-size:19px; margin:4px 0 6px; }
.ts-sum{ color:var(--ink2); font-size:14.5px; margin:0; }
.rd-grid{ display:grid; gap:20px; margin-top:4px; }
@media (min-width:900px){ .rd-grid{ grid-template-columns:minmax(0,1.6fr) minmax(270px,1fr); align-items:start; } }
.notes{ list-style:none; padding:0; margin:0; }
.notes li{ position:relative; padding:11px 12px 11px 34px; font-size:15px; color:var(--ink2); }
.notes li + li{ border-top:1.5px dashed var(--line); }
.notes li::before{
  content:""; position:absolute; left:12px; top:20px;
  width:9px; height:9px; border-radius:3px; background:var(--brand); transform:rotate(45deg);
}
.notes strong{ color:var(--ink); font-weight:700; }
.neon-highlight{
  background:linear-gradient(120deg,#FFE18A,#FFD34D);
  color:#5C4300; font-weight:700;
  padding:1px 7px; border-radius:8px;
  box-decoration-break:clone; -webkit-box-decoration-break:clone;
}
.side{ display:flex; flex-direction:column; gap:16px; }
.side-card{ background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow-sm); }
.sc-h{ font-family:'Baloo 2',cursive; font-weight:800; font-size:16.5px; margin:0 0 10px; display:flex; gap:8px; align-items:center; }
.fstep{ position:relative; padding:0 0 14px 34px; font-size:13.5px; color:var(--ink2); }
.fstep::before{ content:""; position:absolute; left:11px; top:26px; bottom:4px; border-left:2px dashed var(--line); }
.fstep:last-child{ padding-bottom:0; }
.fstep:last-child::before{ display:none; }
.fno{
  position:absolute; left:0; top:-1px; width:24px; height:24px; border-radius:9px;
  background:var(--brandSoft); color:var(--brand); font-weight:800; font-size:12.5px;
  display:flex; align-items:center; justify-content:center;
}
.term{ padding:10px 12px; border-radius:14px; background:var(--surface2); margin-bottom:8px; }
.term h5{ margin:0; font-size:14px; font-weight:800; color:var(--ink); }
.term p{ margin:3px 0 0; font-size:13px; color:var(--muted); }
.quote{
  margin:0 0 10px; padding:10px 12px 10px 14px;
  border-left:4px solid var(--brand); background:var(--surface2);
  border-radius:6px 14px 14px 6px; font-size:13.5px; color:var(--ink2);
}
.rd-actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:22px; }
.doodle-svg{ width:88px; height:88px; }
.doodle-caption{ display:block; font-size:11px; color:var(--muted); margin-top:6px; text-align:center; font-weight:600; }
.ink-blue{ color:#5B79EF; }
.ink-green{ color:var(--vist); }
.ink-black{ color:var(--ink); }
.ink-amber{ color:var(--poet); }
.ink-red{ color:var(--flam); }

/* ---------------- Quiz ---------------- */
.drill-hero{
  background:linear-gradient(135deg,var(--brand),var(--flam));
  color:#fff; border-radius:26px; padding:22px;
  display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;
  box-shadow:var(--shadow);
}
.dh-t{ font-family:'Baloo 2',cursive; font-weight:800; font-size:24px; margin:0; }
.dh-s{ margin:4px 0 0; font-size:13.5px; color:rgba(255,255,255,.88); max-width:430px; }
.scope-grid{ display:grid; grid-template-columns:1fr; gap:10px; }
@media (min-width:620px){ .scope-grid{ grid-template-columns:1fr 1fr 1fr; } }
.scope-btn{
  text-align:left; cursor:pointer;
  background:var(--surface); border:1.5px solid var(--line);
  border-radius:18px; padding:15px; transition:all .15s;
}
.scope-btn:hover{ transform:translateY(-2px); border-color:var(--brand); }
.sb-t{ font-family:'Baloo 2',cursive; font-weight:800; font-size:16px; margin:6px 0 2px; }
.sb-n{ font-size:12.5px; color:var(--muted); }
.q-top{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
.q-track{ height:10px; background:var(--surface2); border-radius:99px; overflow:hidden; margin:12px 0 4px; }
.q-fill{ height:100%; border-radius:99px; background:linear-gradient(90deg,var(--brand),var(--flam)); transition:width .3s; }
.q-count{ font-size:12.5px; color:var(--muted); text-align:right; font-weight:600; }
.q-card{ margin-top:12px; }
.q-q{ font-family:'Baloo 2',cursive; font-weight:800; font-size:20px; line-height:1.3; margin:10px 0 16px; }
.qopt{
  display:flex; gap:12px; align-items:flex-start; width:100%; text-align:left;
  background:var(--surface2); border:2px solid transparent; border-radius:16px;
  padding:13px 14px; margin-bottom:10px; cursor:pointer;
  font-size:14.5px; color:var(--ink2);
  transition:border-color .15s, background .15s, transform .1s;
}
.qopt:not(:disabled):hover{ border-color:var(--brand); transform:translateX(2px); }
.qopt:disabled{ cursor:default; }
.ol{
  flex:none; width:28px; height:28px; border-radius:10px;
  background:var(--surface); border:2px solid var(--line); color:var(--muted);
  font-weight:800; font-size:13px;
  display:flex; align-items:center; justify-content:center;
}
.qopt.correct{ background:var(--goodSoft); border-color:var(--good); color:var(--ink); }
.qopt.correct .ol{ background:var(--good); border-color:var(--good); color:#fff; }
.qopt.wrong{ background:var(--badSoft); border-color:var(--bad); color:var(--ink); }
.qopt.wrong .ol{ background:var(--bad); border-color:var(--bad); color:#fff; }
.qopt.dim{ opacity:.5; }
.fb-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:8px; min-height:48px; }
.fb-msg{ font-weight:800; font-size:14.5px; }
.fb-msg.ok{ color:var(--good); }
.fb-msg.no{ color:var(--bad); }
.res-hero{ text-align:center; padding:28px 18px; }
.res-verdict{ font-family:'Baloo 2',cursive; font-weight:800; font-size:24px; margin:14px 0 4px; }
.res-sub{ color:var(--muted); font-size:14px; margin:0; }
.res-chips{ display:flex; justify-content:center; gap:10px; margin-top:14px; flex-wrap:wrap; }
.chip-stat{ padding:7px 15px; border-radius:999px; font-weight:800; font-size:13px; }
.chip-stat.g{ background:var(--goodSoft); color:var(--good); }
.chip-stat.b{ background:var(--badSoft); color:var(--bad); }
.miss{ padding:12px 14px; border-radius:14px; background:var(--surface2); border-left:4px solid var(--bad); margin-bottom:10px; }
.miss-ch{ font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:0 0 3px; }
.miss-q{ font-weight:700; color:var(--ink); font-size:14px; margin:0; }
.miss-a{ font-size:13px; color:var(--muted); margin:5px 0 0; }
.miss-a b{ color:var(--good); }

/* ---------------- Progress ---------------- */
.p-hero{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
.p-hero-t{ font-family:'Baloo 2',cursive; font-weight:800; font-size:20px; margin:0; }
.p-hero-s{ color:var(--muted); font-size:13.5px; margin:4px 0 0; }
.check-row{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  padding:10px 6px; border:0; border-bottom:1.5px dashed var(--line);
  background:none; cursor:pointer;
}
.check-row:last-child{ border-bottom:0; }
.cb{
  width:24px; height:24px; flex:none; border-radius:8px;
  border:2px solid var(--line); color:#fff; font-weight:800; font-size:13px;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.check-row.on .cb{ background:var(--good); border-color:var(--good); }
.cr-t{ font-weight:600; font-size:14.5px; color:var(--ink); }
.cr-a{ font-size:11.5px; color:var(--muted); }
.log-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 4px; border-bottom:1.5px dashed var(--line); font-size:13.5px; }
.log-row:last-child{ border-bottom:0; }
.log-l{ font-weight:700; color:var(--ink); }
.log-d{ color:var(--muted); font-size:12px; }
.log-score{ font-weight:800; padding:4px 12px; border-radius:999px; font-size:12.5px; }
.sp-note{ font-size:13.5px; color:var(--ink2); margin:6px 0 14px; }
.sp-btns{ display:flex; flex-wrap:wrap; gap:10px; }
#impCode{
  width:100%; min-height:76px; margin-top:12px;
  border:1.5px solid var(--line); border-radius:14px;
  background:var(--surface2); color:var(--ink);
  padding:10px 12px; font-size:12.5px; font-family:inherit; resize:vertical;
}
.danger{ margin-top:16px; padding-top:12px; border-top:1.5px dashed var(--line); }
.link-danger{ background:none; border:0; color:var(--bad); font-weight:700; font-size:13.5px; cursor:pointer; }

/* ---------------- Modal + toast + confetti ---------------- */
.modal{
  position:fixed; inset:0; z-index:120;
  background:rgba(20,16,50,.55); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal-card{
  background:var(--surface); border-radius:24px; padding:24px;
  max-width:400px; width:100%; text-align:center; box-shadow:var(--shadow);
  animation:viewIn .22s ease;
}
.m-t{ font-family:'Baloo 2',cursive; font-weight:800; font-size:22px; margin:0; }
.m-b{ color:var(--ink2); font-size:14.5px; margin:8px 0 18px; }
.m-btns{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.toast{
  position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); z-index:130;
  transform:translateX(-50%) translateY(8px);
  background:var(--ink); color:var(--bg);
  padding:11px 20px; border-radius:999px; font-weight:700; font-size:14px;
  box-shadow:var(--shadow); opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
#confetti{ position:fixed; inset:0; z-index:140; pointer-events:none; }

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation:none !important; transition:none !important; }
}
@media print{
  .topbar, .navbar, .toast, .modal{ display:none !important; }
  body{ background:#fff; }
  .shell{ padding:0; }
}

        /* ================= SAFE STORAGE ================= */
        const store = (() => {
            try {
                const t = "__br_test__";
                localStorage.setItem(t, "1");
                localStorage.removeItem(t);
                return { persistent: true, get: k => localStorage.getItem(k), set: (k, v) => localStorage.setItem(k, v), del: k => localStorage.removeItem(k) };
            } catch (e) {
                const mem = {};
                return { persistent: false, get: k => (k in mem ? mem[k] : null), set: (k, v) => { mem[k] = v; }, del: k => { delete mem[k]; } };
            }
        })();

        const SAVE_KEY = "boardready_en12_v1";
        let save = { v: 2, revised: {}, lastChapter: null, quizLog: [], theme: null };

        function loadSave() {
            try {
                const raw = store.get(SAVE_KEY);
                if (!raw) return;
                const s = JSON.parse(raw);
                if (s && typeof s === "object") {
                    save.revised = (s.revised && typeof s.revised === "object") ? s.revised : {};
                    save.lastChapter = s.lastChapter || null;
                    save.quizLog = Array.isArray(s.quizLog) ? s.quizLog.slice(0, 20) : [];
                    save.theme = s.theme || null;
                }
            } catch (e) { /* corrupt save: start fresh */ }
        }
        function persist() { try { store.set(SAVE_KEY, JSON.stringify(save)); } catch (e) {} }

        /* ================= HELPERS ================= */
        const $ = id => document.getElementById(id);
        const coreChapters = () => studyDatabase.filter(c => c.status !== "archive");
        function sectionOf(ch) {
            if (ch.status === "archive") return "archive";
            if (ch.book === "Flamingo") return ch.type === "Poetry" ? "poetry" : "prose";
            return "vistas";
        }
        const SECTIONS = {
            prose:   { label: "Flamingo · Prose",  short: "Prose",   c: "--flam", cs: "--flamSoft" },
            poetry:  { label: "Flamingo · Poetry", short: "Poetry",  c: "--poet", cs: "--poetSoft" },
            vistas:  { label: "Vistas",            short: "Vistas",  c: "--vist", cs: "--vistSoft" },
            archive: { label: "Archive",           short: "Archive", c: "--arch", cs: "--archSoft" }
        };
        function tagHtml(sec, text) {
            const m = SECTIONS[sec];
            return `<span class="tag" style="background:var(${m.cs});color:var(${m.c})">${text}</span>`;
        }
        function byId(id) { return studyDatabase.find(c => c.id === id); }
        function sectionChapters(sec) { return studyDatabase.filter(c => sectionOf(c) === sec); }
        function revisedCount(list) { return list.filter(c => save.revised[c.id]).length; }
        function shuffle(a) {
            const arr = a.slice();
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        function ringSvg(pct, size, fillColor, trackColor, fontPx) {
            const sw = Math.max(8, Math.round(size * 0.1));
            const r = (size - sw) / 2, c = size / 2;
            const cir = 2 * Math.PI * r, off = cir * (1 - Math.min(1, Math.max(0, pct)));
            return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
                <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
                  <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${trackColor}" stroke-width="${sw}"/>
                  <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${fillColor}" stroke-width="${sw}" stroke-linecap="round"
                    stroke-dasharray="${cir.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
                    transform="rotate(-90 ${c} ${c})" style="transition:stroke-dashoffset .6s ease"/>
                </svg>
                <div class="ring-num" style="font-size:${fontPx}px">${Math.round(pct * 100)}%</div>
              </div>`;
        }

        /* ================= THEME ================= */
        function applyTheme() {
            const pref = save.theme || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

        function toggleTheme() {

            currentView = v;

            document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === navKey));
            if (v === "home") renderHome();

        /* ================= HOME ================= */
        function barRows(includeArchive) {
            const keys = includeArchive ? ["prose", "poetry", "vistas", "archive"] : ["prose", "poetry", "vistas"];
            return keys.map(k => {
                const list = sectionChapters(k);
                const done = revisedCount(list);
                const pct = list.length ? (done / list.length) * 100 : 0;
                return `<div class="bar-row">
                    <div class="bar-tagcol">${tagHtml(k, SECTIONS[k].short)}</div>

                  </div>`;
            }).join("");
        }

        /* ================= LIBRARY ================= */
        let activeFilter = "all";

            query = v || "";

                const el = $(id);

        function setFilter(f) { activeFilter = f; renderLibrary(); }
        function renderLibrary() {
            const counts = { all: studyDatabase.length };
            ["prose", "poetry", "vistas", "archive"].forEach(k => counts[k] = sectionChapters(k).length);
            $("filterPills").innerHTML = [
                ["all", "All " + counts.all],
                ["prose", "Prose " + counts.prose],
                ["poetry", "Poetry " + counts.poetry],
                ["vistas", "Vistas " + counts.vistas],
                ["archive", "Archive " + counts.archive]
            ].map(([k, lbl]) => `<button class="pill ${activeFilter === k ? "active" : ""}" onclick="setFilter('${k}')">${lbl}</button>`).join("");
            const q = query.trim().toLowerCase();
            const list = studyDatabase.filter(ch => {
                if (activeFilter !== "all" && sectionOf(ch) !== activeFilter) return false;
                if (!q) return true;
                return (ch.title + " " + ch.author + " " + ch.theme + " " + ch.summary).toLowerCase().includes(q);

            $("chGrid").innerHTML = list.map(ch => {
                const sec = sectionOf(ch);

            $("readerBody").innerHTML = `
                <div class="rd-top">
                  <button class="chip-btn" onclick="switchView('library')">← Chapters</button>
                  <div class="rd-nav">
                    <button class="chip-btn" ${prev ? `onclick="openChapter('${prev.id}')"` : "disabled"}>← Prev</button>
                    <button class="chip-btn" ${next ? `onclick="openChapter('${next.id}')"` : "disabled"}>Next →</button>
                  </div>
                </div>
                <div class="rd-hero" style="background:var(${m.cs})">
                  <div class="rd-hero-main">
                    <div class="cc-tags">${tagHtml(sec, m.label)}<span class="tag" style="background:var(--surface);color:var(--ink2)">${isArch ? "Archive" : ch.chapterNo}</span></div>
                    <h1 class="rd-title">${ch.title}</h1>
                    <p class="rd-auth">by ${ch.author}</p>
                    <button class="revised-pill ${done ? "on" : ""}" onclick="toggleRevised('${ch.id}')">${done ? "✓ Revised" : "○ Mark as revised"}</button>
                  </div>
                  <div class="rd-doodle">${ch.doodleSvg || ""}</div>
                </div>
                ${banners}
                <div class="card theme-strip">
                  <p class="ts-kicker">💡 Theme in one line</p>
                  <h2 class="ts-line">${ch.theme}</h2>
                  <p class="ts-sum">${ch.summary}</p>
                </div>
                <div class="rd-grid">
                  <div class="card">
                    <h3 class="sc-h">✍️ Study Notes</h3>
                    <ul class="notes">${(ch.bulletNotes || []).map(n => `<li>${n}</li>`).join("")}</ul>
                  </div>
                  <div class="side">
                    <div class="side-card">
                      <h3 class="sc-h">${isPoem ? "📜 Poem Flow" : "🕒 Story Arc"}</h3>
                      ${(ch.flowchartSteps || []).map((s, i) => `<div class="fstep"><span class="fno">${i + 1}</span>${s}</div>`).join("")}
                    </div>
                    <div class="side-card">
                      <h3 class="sc-h">${isPoem ? "🎭 Poetic Devices" : "🔑 Key Terms"}</h3>
                      ${(ch.keyTerms || []).map(t => `<div class="term"><h5>${t.term}</h5><p>${t.definition}</p></div>`).join("")}
                    </div>
                    <div class="side-card">
                      <h3 class="sc-h">${isPoem ? "🖼️ Key Images" : "💬 Core Quotes"}</h3>
                      ${(ch.quotes || []).map(qt => `<p class="quote" style="border-left-color:var(${m.c})">${qt}</p>`).join("")}
                    </div>
                  </div>
                </div>
                <div class="rd-actions">
                  <button class="btn btn-primary" onclick="startQuiz('${ch.id}')">🎯 Quiz this chapter</button>
                  ${next ? `<button class="btn btn-soft" onclick="openChapter('${next.id}')">Next chapter →</button>` : ""}
                </div>`;
        }

        /* ================= QUIZ ================= */
        let quizState = null;
        function scopeTitles(scope) {
            if (scope === "core") return coreChapters().map(c => c.title);
            if (scope === "prose" || scope === "poetry" || scope === "vistas") return sectionChapters(scope).map(c => c.title);
            const ch = byId(scope);
            return ch ? [ch.title] : [];
        }
        function scopeLabel(scope) {
            if (scope === "core") return "Full Board Drill";
            if (scope === "prose") return "Flamingo Prose";
            if (scope === "poetry") return "Flamingo Poetry";
            if (scope === "vistas") return "Vistas";
            const ch = byId(scope);
            return ch ? ch.title : "Quiz";
        }
        function startQuiz(scope) {
            const titles = new Set(scopeTitles(scope));
            const pool = [];
            quizQuestions.forEach((q, i) => { if (titles.has(q.chapter)) pool.push(i); });
            if (!pool.length) { showNote("No questions yet", "This selection has no quiz questions."); return; }
            quizState = {
                scope, label: scopeLabel(scope),
                list: shuffle(pool).map(qi => ({ qi, ord: shuffle([0, 1, 2, 3]) })),
                idx: 0, picked: {}, right: 0, done: false
            };
            switchView("quiz");
        }
        function chooseAnswer(orig) {
            if (!quizState || quizState.done) return;
            const i = quizState.idx;
            if (quizState.picked[i] !== undefined) return;
            quizState.picked[i] = orig;
            const q = quizQuestions[quizState.list[i].qi];
            if (orig === q.answer) quizState.right++;
            renderQuiz();
        }
        function nextQuestion() {
            if (!quizState) return;
            if (quizState.idx < quizState.list.length - 1) { quizState.idx++; renderQuiz(); }
            else finishQuiz();
        }
        function finishQuiz() {
            quizState.done = true;
            const total = quizState.list.length;
            save.quizLog.push({ d: Date.now(), label: quizState.label, score: quizState.right, total });
            if (save.quizLog.length > 20) save.quizLog = save.quizLog.slice(-20);
            persist();
            renderQuiz();
            if (quizState.right / total >= 0.8) launchConfetti();
        }
        function exitQuizAsk() {
            if (!quizState || quizState.done || Object.keys(quizState.picked).length === 0) {
                quizState = null; renderQuiz(); return;
            }
            askConfirm("Leave the quiz?", "Your answers so far will be discarded.", "Leave", () => { quizState = null; renderQuiz(); });
        }
        function renderQuiz() {
            if (!quizState) { renderQuizSetup(); return; }
            if (quizState.done) { renderQuizResults(); return; }
            renderQuizRunner();
        }
        function qCount(scope) {
            const titles = new Set(scopeTitles(scope));
            return quizQuestions.filter(q => titles.has(q.chapter)).length;
        }
        function renderQuizSetup() {
            $("quizBody").innerHTML = `
                <div class="drill-hero">
                  <div style="min-width:0">
                    <h1 class="dh-t">Quiz Arena 🎯</h1>
                    <p class="dh-s">The full board drill covers every syllabus chapter: ${qCount("core")} questions with instant feedback. Options shuffle on every attempt.</p>
                  </div>
                  <button class="btn btn-white" onclick="startQuiz('core')">Start full drill</button>
                </div>
                <h2 class="sec-h">🎪 Or drill one section</h2>
                <div class="scope-grid">
                  <button class="scope-btn" onclick="startQuiz('prose')"><span style="font-size:22px">🩰</span><div class="sb-t">Flamingo Prose</div><div class="sb-n">${qCount("prose")} questions · 8 chapters</div></button>
                  <button class="scope-btn" onclick="startQuiz('poetry')"><span style="font-size:22px">🪶</span><div class="sb-t">Flamingo Poetry</div><div class="sb-n">${qCount("poetry")} questions · 5 poems</div></button>
                  <button class="scope-btn" onclick="startQuiz('vistas')"><span style="font-size:22px">🔭</span><div class="sb-t">Vistas</div><div class="sb-n">${qCount("vistas")} questions · 6 chapters</div></button>
                </div>
                <div class="card note-card" style="margin-top:16px">💡 Want a single chapter? Open it from Chapters and hit Quiz this chapter. Archive questions live only inside the archive chapters.</div>`;
        }
        function renderQuizRunner() {
            const i = quizState.idx, total = quizState.list.length;
            const item = quizState.list[i];
            const q = quizQuestions[item.qi];
            const picked = quizState.picked[i];
            const answered = picked !== undefined;
            const ch = studyDatabase.find(c => c.title === q.chapter);
            const sec = ch ? sectionOf(ch) : "prose";
            const opts = item.ord.map((orig, disp) => {
                let cls = "qopt";
                if (answered) {
                    if (orig === q.answer) cls += " correct";
                    else if (orig === picked) cls += " wrong";
                    else cls += " dim";
                }
                return `<button class="${cls}" ${answered ? "disabled" : `onclick="chooseAnswer(${orig})"`}>
                    <span class="ol">${"ABCD"[disp]}</span><span>${q.options[orig]}</span>
                  </button>`;
            }).join("");
            const fb = answered
                ? (picked === q.answer
                    ? `<span class="fb-msg ok">✅ Nailed it!</span>`
                    : `<span class="fb-msg no">❌ Not quite. The right answer is highlighted.</span>`)
                : `<span class="fb-msg" style="color:var(--muted)">Pick an answer to lock it in</span>`;
            const nextBtn = answered
                ? `<button class="btn btn-primary" onclick="nextQuestion()">${i === total - 1 ? "See results 🏁" : "Next →"}</button>`
                : "";
            $("quizBody").innerHTML = `
                <div class="q-top">
                  ${tagHtml("prose", quizState.label).replace("--flamSoft", "--brandSoft").replace("--flam", "--brand")}
                  <button class="chip-btn" onclick="exitQuizAsk()">✕ Exit</button>
                </div>
                <div class="q-track"><div class="q-fill" style="width:${((i + (answered ? 1 : 0)) / total) * 100}%"></div></div>
                <div class="q-count">Question ${i + 1} of ${total} · Score ${quizState.right}</div>
                <div class="card q-card">
                  ${tagHtml(sec, q.chapter)}
                  <h2 class="q-q">${q.q}</h2>
                  ${opts}
                  <div class="fb-row">${fb}${nextBtn}</div>
                </div>`;
        }
        function renderQuizResults() {
            const total = quizState.list.length;
            const right = quizState.right;
            const pct = right / total;
            const color = pct >= 0.8 ? "var(--good)" : pct >= 0.5 ? "var(--poet)" : "var(--bad)";
            const verdict = pct >= 0.9 ? "Beast mode unlocked 🦁"
                : pct >= 0.7 ? "Strong. Sharpen the misses. 💪"
                : pct >= 0.4 ? "Halfway there. The review below is your homework. 📖"
                : "Rough round. Reread the notes, retake tomorrow. 🔁";
            const misses = quizState.list.map((item, i) => ({ item, i }))
                .filter(({ item, i }) => quizState.picked[i] !== quizQuestions[item.qi].answer)
                .map(({ item }) => {
                    const q = quizQuestions[item.qi];
                    return `<div class="miss">
                        <p class="miss-ch">${q.chapter}</p>
                        <p class="miss-q">${q.q}</p>
                        <p class="miss-a">Correct answer: <b>${q.options[q.answer]}</b></p>
                      </div>`;
                }).join("");
            $("quizBody").innerHTML = `
                <div class="card res-hero">
                  ${ringSvg(pct, 130, color, "var(--surface2)", 24)}
                  <h2 class="res-verdict">${verdict}</h2>
                  <p class="res-sub">${quizState.label} · ${right} of ${total} correct</p>
                  <div class="res-chips">
                    <span class="chip-stat g">✓ ${right} right</span>
                    <span class="chip-stat b">✗ ${total - right} wrong</span>
                  </div>
                </div>
                ${misses ? `<h2 class="sec-h">🔍 Review your misses</h2>${misses}` : `<div class="card note-card" style="margin-top:16px">🎉 A perfect run. Nothing to review.</div>`}
                <div class="rd-actions">
                  <button class="btn btn-primary" onclick="startQuiz('${quizState.scope}')">🔁 Retake</button>
                  ${quizState.scope !== "core" ? `<button class="btn btn-soft" onclick="startQuiz('core')">🎯 Full drill</button>` : ""}
                  <button class="btn btn-soft" onclick="quizState=null;switchView('library')">📚 Back to chapters</button>
                </div>`;
        }

        /* ================= PROGRESS ================= */
        function renderProgress() {
            const core = coreChapters();
            const done = revisedCount(core);
            const pct = core.length ? done / core.length : 0;
            const groups = ["prose", "poetry", "vistas", "archive"].map(k => {
                const list = sectionChapters(k);
                const rows = list.map(ch => `
                    <button class="check-row ${save.revised[ch.id] ? "on" : ""}" onclick="toggleRevised('${ch.id}')">
                      <span class="cb">${save.revised[ch.id] ? "✓" : ""}</span>
                      <span style="min-width:0"><span class="cr-t">${ch.title}</span><br><span class="cr-a">${ch.author}</span></span>
                    </button>`).join("");
                return `<h2 class="sec-h">${tagHtml(k, SECTIONS[k].label)}</h2><div class="card" style="padding:8px 14px">${rows}</div>`;
            }).join("");
            const logs = save.quizLog.slice(-8).reverse().map(l => {
                const p = l.total ? l.score / l.total : 0;
                const st = p >= 0.8 ? "background:var(--goodSoft);color:var(--good)" : p >= 0.5 ? "background:var(--poetSoft);color:var(--poet)" : "background:var(--badSoft);color:var(--bad)";
                const dt = new Date(l.d).toLocaleDateString(undefined, { day: "numeric", month: "short" });
                return `<div class="log-row"><span><span class="log-l">${l.label}</span> <span class="log-d">· ${dt}</span></span><span class="log-score" style="${st}">${l.score}/${l.total}</span></div>`;
            }).join("");
            $("progressBody").innerHTML = `
                <div class="card p-hero">
                  ${ringSvg(pct, 110, "var(--brand)", "var(--surface2)", 21)}
                  <div style="min-width:0">
                    <h1 class="p-hero-t">${done} of ${core.length} syllabus chapters revised</h1>
                    <p class="p-hero-s">The ring counts only the ${core.length} examinable chapters. Archive reading is extra credit.</p>
                  </div>
                </div>
                ${groups}
                <h2 class="sec-h">🏆 Recent quizzes</h2>
                <div class="card">${logs || `<p class="p-hero-s" style="margin:6px 0">No quizzes yet. The drill is waiting. 🎯</p>`}</div>`;
        }

        /* ================= SAVE / EXPORT / IMPORT ================= */
        function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
        function b64decode(str) { return decodeURIComponent(escape(atob(str))); }
        function exportFile() {
            const blob = new Blob([JSON.stringify(save, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "boardready-english-progress.json";
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 800);
            showToast("Progress file exported ✓");
        }
        function copyCode() {
            const code = b64encode(JSON.stringify(save));
            const finish = ok => showToast(ok ? "Backup code copied ✓" : "Copy failed. Long-press to copy instead.");
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(() => finish(true)).catch(() => { $("impCode").value = code; finish(false); });
            } else {
                $("impCode").value = code;
                try { $("impCode").select(); document.execCommand("copy"); finish(true); } catch (e) { finish(false); }
            }
        }
        function importFile(input) {
            const f = input.files && input.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = () => applyImport(String(r.result || ""));
            r.readAsText(f);
            input.value = "";
        }
        function importCode() {
            const txt = $("impCode").value.trim();
            if (!txt) { showNote("Nothing to restore", "Paste a backup code or the exported file text first."); return; }
            applyImport(txt);
        }
        function applyImport(text) {
            let obj = null;
            try { obj = JSON.parse(text); }
            catch (e) { try { obj = JSON.parse(b64decode(text.trim())); } catch (e2) { obj = null; } }
            if (!obj || typeof obj !== "object" || !obj.revised || typeof obj.revised !== "object") {
                showNote("Could not read that", "That does not look like a BoardReady progress file or backup code.");
                return;
            }
            askConfirm("Restore this progress?", "It will replace whatever is currently saved in this browser.", "Restore", () => {
                save = {
                    v: 2,
                    revised: obj.revised || {},
                    lastChapter: obj.lastChapter || null,
                    quizLog: Array.isArray(obj.quizLog) ? obj.quizLog.slice(-20) : [],
                    theme: obj.theme || save.theme
                };
                persist(); applyTheme();
                $("impCode").value = "";
                renderHome(); renderLibrary(); renderProgress();
                switchView("progress");
                showToast("Progress restored ✓");
            });
        }
        function resetAllAsk() {
            askConfirm("Reset everything?", "Revised marks and quiz history will be wiped. Your theme stays.", "Reset", () => {
                save = { v: 2, revised: {}, lastChapter: null, quizLog: [], theme: save.theme };
                persist(); quizState = null;
                renderHome(); renderLibrary(); renderProgress(); renderQuiz();
                showToast("Fresh start ✓");
            });
        }

        /* ================= MODALS + TOAST + CONFETTI ================= */
        let pendingConfirm = null;
        function showNote(t, b) { $("noteTitle").textContent = t; $("noteBody").textContent = b; $("noteModal").classList.remove("hidden"); }
        function closeNote() { $("noteModal").classList.add("hidden"); }
        function askConfirm(t, b, okLabel, fn) {
            pendingConfirm = fn;
            $("confirmTitle").textContent = t;
            $("confirmBody").textContent = b;
            $("confirmOk").textContent = okLabel;
            $("confirmModal").classList.remove("hidden");
        }
        function closeConfirm() { pendingConfirm = null; $("confirmModal").classList.add("hidden"); }
        function doConfirm() {
            $("confirmModal").classList.add("hidden");
            const fn = pendingConfirm; pendingConfirm = null;
            if (fn) fn();
        }
        let toastTimer = null;
        function showToast(msg) {
            const t = $("toast");
            t.textContent = msg;
            t.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
        }
        function launchConfetti() {
            const cv = $("confetti");
            const ctx = cv.getContext && cv.getContext("2d");
            if (!ctx) return;
            cv.classList.remove("hidden");
            cv.width = innerWidth; cv.height = innerHeight;
            const colors = ["#6C5CE7", "#F2477E", "#E08700", "#0FA396", "#1DB954", "#8B7CF3"];
            const bits = Array.from({ length: 130 }, () => ({
                x: Math.random() * cv.width,
                y: -20 - Math.random() * cv.height * 0.4,
                w: 6 + Math.random() * 7,
                h: 8 + Math.random() * 8,
                vy: 2.4 + Math.random() * 3.4,
                vx: -1.4 + Math.random() * 2.8,
                rot: Math.random() * Math.PI,
                vr: -0.14 + Math.random() * 0.28,
                c: colors[Math.floor(Math.random() * colors.length)]
            }));
            const t0 = performance.now();
            (function frame(now) {
                const el = now - t0;
                ctx.clearRect(0, 0, cv.width, cv.height);
                bits.forEach(b => {
                    b.x += b.vx; b.y += b.vy; b.vy += 0.05; b.rot += b.vr;
                    ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
                    ctx.fillStyle = b.c; ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
                    ctx.restore();
                });
                if (el < 2100) requestAnimationFrame(frame);
                else { ctx.clearRect(0, 0, cv.width, cv.height); cv.classList.add("hidden"); }
            })(t0);
        }

        /* ================= KEYBOARD ================= */
        document.addEventListener("keydown", e => {
            if (e.key === "Escape") { closeNote(); closeConfirm(); return; }
            const tag = (e.target.tagName || "").toLowerCase();
            if (tag === "input" || tag === "textarea" || e.metaKey || e.ctrlKey || e.altKey) return;
            if (e.key === "/") {
                e.preventDefault();
                if (currentView !== "library") switchView("library");
                const el = innerWidth >= 861 ? $("searchDesk") : $("searchMob");
                if (el) el.focus();
                return;
            }
            if (currentView === "quiz" && quizState && !quizState.done) {
                const n = parseInt(e.key, 10);
                if (n >= 1 && n <= 4 && quizState.picked[quizState.idx] === undefined) {
                    chooseAnswer(quizState.list[quizState.idx].ord[n - 1]);
                    return;
                }
                if (e.key === "Enter" && quizState.picked[quizState.idx] !== undefined) { nextQuestion(); return; }
            }
            if (currentView === "reader" && currentChapterId) {
                const order = studyDatabase;
                const idx = order.findIndex(c => c.id === currentChapterId);
                if (e.key === "ArrowLeft" && idx > 0) openChapter(order[idx - 1].id);
                if (e.key === "ArrowRight" && idx < order.length - 1) openChapter(order[idx + 1].id);
            }
        });

        /* ================= INIT ================= */
        ["noteModal", "confirmModal"].forEach(id => {
            $(id).addEventListener("click", e => { if (e.target === $(id)) { closeNote(); closeConfirm(); } });
        });
        loadSave();
        applyTheme();
        $("saveStatus").textContent = store.persistent
            ? "🟢 Auto-save is on in this browser."
            : "🟠 This browser blocks auto-save, so export your progress before closing!";
        renderHome();
        renderLibrary();
        renderProgress();
        renderQuiz();
        switchView("home");

</script>
</body>
</html>
